apiVersion: v1
kind: Pod
metadata:
  name: k6-test
spec:
  containers:
    - name: k6
      image: grafana/k6
      command: ["k6", "run", "/test/load-test.js"]
      volumeMounts:
        - name: test-volume
          mountPath: /test
  volumes:
    - name: test-volume
      configMap:
        name: load-test