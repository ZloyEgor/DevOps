apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cvetochey-ingress
  namespace: cvetochey
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - cvetochey.ru
    - api.cvetochey.ru
    secretName: cvetochey-tls
  rules:
  - host: cvetochey.ru
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 3000
  - host: api.cvetochey.ru
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8080
