# SonarQube project configuration for CvetOchey Backend
# Project key will be set dynamically in CI/CD based on branch
# sonar.projectKey=cvetochey-backend (for master branch)
# sonar.projectKey=cvetochey-backend-dev (for dev branch)
sonar.projectName=CvetOchey Backend
sonar.projectVersion=1.0

# Source code configuration
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Language configuration
sonar.language=java
sonar.java.source=21

# Coverage configuration
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports

# Quality Gate configuration
sonar.qualitygate.wait=true

# Code coverage thresholds
sonar.coverage.exclusions=**/*Application.java,**/*Config.java,**/*Configuration.java

# Exclude generated files
sonar.exclusions=**/target/**,**/*.jar

# Test exclusions
sonar.test.exclusions=**/target/**

# Encoding
sonar.sourceEncoding=UTF-8
