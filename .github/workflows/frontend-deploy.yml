name: Frontend Docker Build and Deploy

on:
  # Wait for Frontend CI workflow to complete successfully
  workflow_run:
    workflows: ["Frontend CI"]
    types: [completed]
    branches: [ master, dev ]
  # Also allow manual trigger for testing
  workflow_dispatch:

env:
  REGISTRY: cr.yandex
  REGISTRY_ID: crpqt390b8gk59ipqid8
  IMAGE_NAME: cvetochey-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Only run if CI workflow succeeded or manual trigger
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Need full history to detect changes

    - name: Check if frontend files changed
      id: changes
      uses: dorny/paths-filter@v2
      with:
        filters: |
          frontend:
            - 'frontend/**'
            - '.github/workflows/frontend-deploy.yml'

    - name: Skip if no frontend changes
      if: steps.changes.outputs.frontend != 'true'
      run: |
        echo "No frontend files changed, skipping build and deploy"
        exit 0

    - name: Set up Docker Buildx
      if: steps.changes.outputs.frontend == 'true'
      uses: docker/setup-buildx-action@v3
      with:
        platforms: linux/amd64,linux/arm64

    - name: Log in to Yandex Container Registry
      if: steps.changes.outputs.frontend == 'true'
      run: |
        echo "${{ secrets.YC_SERVICE_ACCOUNT_KEY }}" | base64 -d | docker login ${{ env.REGISTRY }} -u json_key --password-stdin

    - name: Set commit SHA for consistent tagging
      if: steps.changes.outputs.frontend == 'true'
      id: commit
      run: |
        # Use the correct commit SHA from workflow_run or current context
        COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
        echo "commit_sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT
        echo "short_sha=${COMMIT_SHA:0:7}" >> $GITHUB_OUTPUT
        echo "Using commit SHA: ${COMMIT_SHA}"

    - name: Extract metadata
      if: steps.changes.outputs.frontend == 'true'
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=raw,value=commit-${{ steps.commit.outputs.short_sha }}
          type=raw,value=latest,enable=${{ github.event.workflow_run.head_branch == 'master' || github.ref == 'refs/heads/master' }}
          type=raw,value=dev,enable=${{ github.event.workflow_run.head_branch == 'dev' || github.ref == 'refs/heads/dev' }}
        labels: |
          org.opencontainers.image.title=${{ env.IMAGE_NAME }}
          org.opencontainers.image.description=CvetOchey Frontend Application
          org.opencontainers.image.vendor=CvetOchey

    - name: Build and push Docker image
      if: steps.changes.outputs.frontend == 'true'
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILDPLATFORM=linux/amd64

    - name: Notify Telegram - Deployment Started
      if: steps.changes.outputs.frontend == 'true'
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        format: markdown
        message: |
          🚀 **Frontend Deployment Started**
          
          **Branch:** `${{ github.event.workflow_run.head_branch || github.ref_name }}`
          **Image Tag:** `commit-${{ steps.commit.outputs.short_sha }}` (also tagged as: `${{ (github.event.workflow_run.head_branch == 'dev' || github.ref_name == 'dev') && 'dev' || 'latest' }}`)
          **Commit:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          **Workflow:** [View Progress](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          ⏳ Deploying to Kubernetes cluster...

    - name: Install and configure Yandex Cloud CLI
      if: steps.changes.outputs.frontend == 'true'
      run: |
        # Install kubectl
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/
        
        # Install yc CLI
        curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
        echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH
        
        # Verify installations
        kubectl version --client
        $HOME/yandex-cloud/bin/yc version

    - name: Configure Yandex Cloud credentials
      if: steps.changes.outputs.frontend == 'true'
      run: |
        # Configure yc
        echo "${{ secrets.YC_SERVICE_ACCOUNT_KEY }}" | base64 -d > key.json
        $HOME/yandex-cloud/bin/yc config set service-account-key key.json
        $HOME/yandex-cloud/bin/yc config set cloud-id ${{ secrets.YC_CLOUD_ID }}
        $HOME/yandex-cloud/bin/yc config set folder-id ${{ secrets.YC_FOLDER_ID }}
        
        # Verify configuration
        $HOME/yandex-cloud/bin/yc config list

    - name: Deploy to Kubernetes
      if: steps.changes.outputs.frontend == 'true'
      run: |
        # Get cluster credentials
        $HOME/yandex-cloud/bin/yc managed-kubernetes cluster get-credentials cvetochey-cluster --external
        
        # Verify cluster connection
        kubectl cluster-info
        kubectl get nodes
        
        # Check current deployment
        kubectl get deployment frontend -n cvetochey -o wide
        
        # Update deployment with new image
        # Use commit SHA to ensure unique image and force pod update
        COMMIT_SHA="${{ steps.commit.outputs.commit_sha }}"
        SHORT_SHA="${{ steps.commit.outputs.short_sha }}"
        BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
        
        # Determine primary tag based on branch
        if [[ "$BRANCH" == "dev" ]]; then
          PRIMARY_TAG="dev"
        else
          PRIMARY_TAG="latest"
        fi
        
        echo "Deploying frontend with commit: $COMMIT_SHA (short: $SHORT_SHA)"
        echo "Branch: $BRANCH, Primary tag: $PRIMARY_TAG"
        echo "Docker image: ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:commit-$SHORT_SHA"
        
        # Use commit-specific tag to force pod recreation
        kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:commit-$SHORT_SHA -n cvetochey
        
        # Wait for rollout to complete
        kubectl rollout status deployment/frontend -n cvetochey --timeout=300s
        
        # Verify deployment
        kubectl get pods -n cvetochey -l app=frontend
        kubectl describe deployment frontend -n cvetochey

    - name: Verify deployment health
      if: steps.changes.outputs.frontend == 'true'
      run: |
        # Wait for pods to be ready
        kubectl wait --for=condition=ready pod -l app=frontend -n cvetochey --timeout=300s
        
        # Check pod logs for any startup errors
        echo "=== Frontend Pod Logs ==="
        kubectl logs -l app=frontend -n cvetochey --tail=50
        
        # Test frontend accessibility
        echo "=== Testing Frontend Accessibility ==="
        kubectl get svc -n cvetochey
        
        # Get pod IP for direct health check (if health endpoint exists)
        POD_NAME=$(kubectl get pods -n cvetochey -l app=frontend -o jsonpath='{.items[0].metadata.name}')
        echo "Testing frontend on pod: $POD_NAME"
        kubectl exec $POD_NAME -n cvetochey -- curl -f http://localhost:3000/ || echo "Frontend direct check failed (may be normal)"
        
        # Test via public IP (if available)
        echo "=== Testing via Load Balancer ==="
        curl -f -m 10 http://89.169.138.79/ || echo "Public frontend check failed"

    - name: Cleanup
      if: always()
      run: |
        # Clean up sensitive files
        rm -f key.json
        
        # Show final status
        BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
        if [[ "$BRANCH" == "master" ]]; then
          echo "=== Final Deployment Status ==="
          kubectl get deployment frontend -n cvetochey
          kubectl get pods -n cvetochey -l app=frontend
        fi
    - name: Notify Telegram - Deployment Success
      if: success() && steps.changes.outputs.frontend == 'true'
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        format: markdown
        message: |
          ✅ **Frontend Deployment Successful!**
          
          **Branch:** `${{ github.event.workflow_run.head_branch || github.ref_name }}`
          **Environment:** `${{ (github.event.workflow_run.head_branch == 'master' || github.ref_name == 'master') && 'Production' || 'Development' }}`
          **Image:** `cvetochey-frontend:commit-${{ steps.commit.outputs.short_sha }}`
          
          🎉 Frontend is now live and accessible!
          📊 [View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

    - name: Notify Telegram - Deployment Failed
      if: failure() && steps.changes.outputs.frontend == 'true'
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        format: markdown
        message: |
          ❌ **Frontend Deployment Failed!**
          
          **Branch:** `${{ github.event.workflow_run.head_branch || github.ref_name }}`
          **Error:** Deployment to Kubernetes failed
          **Commit:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          
          🔍 [Check Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details
          🚨 Manual intervention may be required
