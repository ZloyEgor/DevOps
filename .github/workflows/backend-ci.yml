name: Backend CI

on:
  push:
    branches:
      - master
      - dev
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches:
      - master
      - dev
    types: [opened, synchronize, reopened]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend-lint:
    name: Backend Lint (Checkstyle)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run Checkstyle
        working-directory: ./backend
        run: mvn checkstyle:check

  backend-test:
    name: Backend Test (Maven & Docker)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: cvetochey
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Run tests with coverage
        working-directory: ./backend
        env:
          DATABASE_DRIVER: jdbc:postgresql
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_LOGIN: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_NAME: cvetochey
        run: mvn clean test jacoco:report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/target/site/jacoco/jacoco.xml
          flags: backend
          name: backend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  backend-sonar:
    name: Backend SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [backend-test]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: cvetochey
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Test SonarQube accessibility
        run: |
          # Test SonarQube via load balancer
          echo "🔗 Testing SonarQube at: http://89.169.138.79:30900"
          
          for i in {1..3}; do
            if curl -s http://89.169.138.79:30900/api/system/status; then
              echo "✅ SonarQube is accessible via load balancer"
              break
            else
              echo "⏳ Waiting for SonarQube... (attempt $i/3)"
              sleep 5
            fi
          done

      - name: Run tests and SonarQube analysis
        working-directory: ./backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          DATABASE_DRIVER: jdbc:postgresql
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_LOGIN: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_NAME: cvetochey
        run: |
          # Set branch name for SonarQube analysis
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH_NAME="${{ github.base_ref }}"
            PR_KEY="${{ github.event.pull_request.number }}"
            echo "Analyzing PR #$PR_KEY targeting: $BRANCH_NAME"
          else
            BRANCH_NAME="${{ github.ref_name }}"
            echo "Analyzing branch: $BRANCH_NAME"
          fi
          
          # Use load balancer URL
          SONAR_URL="http://89.169.138.79:30900"
          
          # Use different project keys based on target branch
          if [ "$BRANCH_NAME" = "dev" ]; then
            PROJECT_KEY="cvetochey-backend-dev"
            VERSION_PREFIX="dev"
          elif [ "$BRANCH_NAME" = "master" ]; then
            PROJECT_KEY="cvetochey-backend"
            VERSION_PREFIX="master"
          else
            PROJECT_KEY="cvetochey-backend"
            VERSION_PREFIX="feature"
          fi
          
          # Run SonarQube analysis
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # For PRs, analyze as a branch of the target project
            mvn clean verify sonar:sonar \
              -Dsonar.projectKey="$PROJECT_KEY" \
              -Dsonar.host.url="$SONAR_URL" \
              -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
              -Dsonar.qualitygate.wait=true \
              -Dsonar.projectVersion="pr-$PR_KEY-${{ github.sha }}" \
              -Dsonar.pullrequest.key="$PR_KEY" \
              -Dsonar.pullrequest.branch="${{ github.head_ref }}" \
              -Dsonar.pullrequest.base="$BRANCH_NAME" || \
            mvn clean verify sonar:sonar \
              -Dsonar.projectKey="$PROJECT_KEY" \
              -Dsonar.host.url="$SONAR_URL" \
              -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
              -Dsonar.qualitygate.wait=true \
              -Dsonar.projectVersion="pr-$PR_KEY-${{ github.sha }}"
          else
            # For direct pushes
            mvn clean verify sonar:sonar \
              -Dsonar.projectKey="$PROJECT_KEY" \
              -Dsonar.host.url="$SONAR_URL" \
              -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
              -Dsonar.qualitygate.wait=true \
              -Dsonar.projectVersion="$VERSION_PREFIX-${{ github.sha }}"
          fi


  backend-build:
    name: Backend Build (Maven)
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, backend-sonar]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven
        working-directory: ./backend
        run: mvn clean package -DskipTests

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 7
