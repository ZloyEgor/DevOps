name: Continuous Delivery Pipeline

on:
  push:
    branches: [ dev ]
  workflow_run:
    workflows: ["CI"]
    branches: [ dev ]
    types: [ completed ]

env:
  REGISTRY: cr.yandex
  REGISTRY_ID: crpqt390b8gk59ipqid8

jobs:
  check-ci-status:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Check CI status
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=pending" >> $GITHUB_OUTPUT
          fi

  build-and-deploy-backend:
    needs: check-ci-status
    if: needs.check-ci-status.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to Yandex Container Registry
        run: |
          echo "${{ secrets.YC_SERVICE_ACCOUNT_KEY }}" | base64 -d | docker login ${{ env.REGISTRY }} -u json_key --password-stdin

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/cvetochey-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=commit-
            type=raw,value=dev-latest
          labels: |
            org.opencontainers.image.title=cvetochey-backend
            org.opencontainers.image.description=CvetOchey Backend Service - Dev Environment
            org.opencontainers.image.vendor=CvetOchey

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install and configure Yandex Cloud CLI
        run: |
          # Install kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          
          # Install yc CLI
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH
          
          # Verify installations
          kubectl version --client
          $HOME/yandex-cloud/bin/yc version

      - name: Configure Yandex Cloud credentials
        run: |
          # Configure yc
          echo "${{ secrets.YC_SERVICE_ACCOUNT_KEY }}" | base64 -d > key.json
          $HOME/yandex-cloud/bin/yc config set service-account-key key.json
          $HOME/yandex-cloud/bin/yc config set cloud-id ${{ secrets.YC_CLOUD_ID }}
          $HOME/yandex-cloud/bin/yc config set folder-id ${{ secrets.YC_FOLDER_ID }}

      - name: Deploy backend to Kubernetes
        run: |
          # Get cluster credentials
          $HOME/yandex-cloud/bin/yc managed-kubernetes cluster get-credentials cvetochey-cluster --external
          
          # Update deployment with new image
          kubectl set image deployment/backend backend=${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/cvetochey-backend:dev-latest -n cvetochey
          
          # Wait for rollout to complete
          kubectl rollout status deployment/backend -n cvetochey --timeout=600s
          
          # Verify deployment
          kubectl get pods -n cvetochey -l app=backend

      - name: Run health checks
        run: |
          # Wait for pods to be ready
          kubectl wait --for=condition=ready pod -l app=backend -n cvetochey --timeout=300s
          
          # Test health endpoint
          POD_NAME=$(kubectl get pods -n cvetochey -l app=backend -o jsonpath='{.items[0].metadata.name}')
          kubectl exec $POD_NAME -n cvetochey -- curl -f http://localhost:8080/actuator/health

      - name: Cleanup
        if: always()
        run: rm -f key.json

  build-and-deploy-frontend:
    needs: check-ci-status
    if: needs.check-ci-status.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to Yandex Container Registry
        run: |
          echo "${{ secrets.YC_SERVICE_ACCOUNT_KEY }}" | base64 -d | docker login ${{ env.REGISTRY }} -u json_key --password-stdin

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/cvetochey-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=commit-
            type=raw,value=dev-latest
          labels: |
            org.opencontainers.image.title=cvetochey-frontend
            org.opencontainers.image.description=CvetOchey Frontend Application - Dev Environment
            org.opencontainers.image.vendor=CvetOchey

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install and configure Yandex Cloud CLI
        run: |
          # Install kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          
          # Install yc CLI
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Configure Yandex Cloud credentials
        run: |
          # Configure yc
          echo "${{ secrets.YC_SERVICE_ACCOUNT_KEY }}" | base64 -d > key.json
          $HOME/yandex-cloud/bin/yc config set service-account-key key.json
          $HOME/yandex-cloud/bin/yc config set cloud-id ${{ secrets.YC_CLOUD_ID }}
          $HOME/yandex-cloud/bin/yc config set folder-id ${{ secrets.YC_FOLDER_ID }}

      - name: Deploy frontend to Kubernetes
        run: |
          # Get cluster credentials
          $HOME/yandex-cloud/bin/yc managed-kubernetes cluster get-credentials cvetochey-cluster --external
          
          # Update deployment with new image
          kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/cvetochey-frontend:dev-latest -n cvetochey
          
          # Wait for rollout to complete
          kubectl rollout status deployment/frontend -n cvetochey --timeout=600s
          
          # Verify deployment
          kubectl get pods -n cvetochey -l app=frontend

      - name: Run health checks
        run: |
          # Wait for pods to be ready
          kubectl wait --for=condition=ready pod -l app=frontend -n cvetochey --timeout=300s
          
          # Test frontend accessibility
          POD_NAME=$(kubectl get pods -n cvetochey -l app=frontend -o jsonpath='{.items[0].metadata.name}')
          kubectl exec $POD_NAME -n cvetochey -- curl -f http://localhost:3000/ || echo "Frontend check completed"

      - name: Cleanup
        if: always()
        run: rm -f key.json

  notify-deployment:
    needs: [build-and-deploy-backend, build-and-deploy-frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify successful deployment
        if: needs.build-and-deploy-backend.result == 'success' && needs.build-and-deploy-frontend.result == 'success'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🚀 *Deployment Successful*
            
            *Repository:* [${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})
            *Branch:* `dev`
            *Commit:* [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            
            ✅ Backend deployed successfully
            ✅ Frontend deployed successfully
            
            *Environment:* Development
            *URL:* http://89.169.138.79/

      - name: Notify failed deployment
        if: needs.build-and-deploy-backend.result == 'failure' || needs.build-and-deploy-frontend.result == 'failure'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ *Deployment Failed*
            
            *Repository:* [${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})
            *Branch:* `dev`
            *Commit:* [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            
            ${{ needs.build-and-deploy-backend.result == 'failure' && '❌ Backend deployment failed' || '✅ Backend deployed successfully' }}
            ${{ needs.build-and-deploy-frontend.result == 'failure' && '❌ Frontend deployment failed' || '✅ Frontend deployed successfully' }}
            
            [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
