# SonarQube project configuration for CvetOchey Frontend
# Project key will be set dynamically in CI/CD based on branch
# sonar.projectKey=cvetochey-frontend (for master branch)
# sonar.projectKey=cvetochey-frontend-dev (for dev branch)
sonar.projectName=CvetOchey Frontend
sonar.projectVersion=1.0

# Source code configuration
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Language configuration
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Quality Gate configuration
sonar.qualitygate.wait=true

# Exclusions
sonar.exclusions=**/node_modules/**,**/coverage/**,**/.next/**,**/public/**,**/*.config.js,**/*.config.ts

# Test exclusions
sonar.test.exclusions=**/node_modules/**,**/coverage/**,**/.next/**

# Coverage exclusions
sonar.coverage.exclusions=**/*.config.js,**/*.config.ts,**/jest.setup.ts,**/next-env.d.ts

# Encoding
sonar.sourceEncoding=UTF-8
